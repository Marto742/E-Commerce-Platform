name: E2E

# Manual trigger for now. Promote to `pull_request: [main]` once the suite is validated
# against the running stack (and Stripe test secrets are configured for the payment spec).
on:
  workflow_dispatch:

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce_test
  REDIS_URL: redis://localhost:6379
  JWT_ACCESS_SECRET: ci-access-secret-must-be-at-least-32-chars-xx
  JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars-xx
  CORS_ORIGIN: http://localhost:3000,http://localhost:3001
  # Meilisearch isn't started here; search degrades gracefully. Dummy values satisfy env validation.
  MEILISEARCH_URL: http://localhost:7700
  MEILISEARCH_KEY: ci-dummy-key
  NEXT_PUBLIC_API_URL: http://localhost:4000/v1
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  # Stripe test keys (optional) enable the checkout payment spec.
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_TEST_PUBLISHABLE_KEY }}
  E2E_START_SERVERS: '1'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @repo/api db:generate

      - name: Apply migrations
        run: pnpm --filter @repo/api exec prisma migrate deploy

      - name: Seed database
        run: pnpm --filter @repo/api db:seed

      - name: Install Playwright browsers
        run: pnpm --filter @repo/e2e exec playwright install --with-deps

      - name: Run E2E (boots api/web/admin via Playwright webServer)
        run: pnpm --filter @repo/e2e e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
