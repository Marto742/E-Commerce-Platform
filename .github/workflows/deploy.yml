name: Deploy

# OPTIONAL explicit deploy. The default path is provider Git-integration:
# Railway (API) and Vercel (web/admin) auto-redeploy on push to `main` after CI
# passes — see docs/deployment.md. This workflow is for teams that prefer driving
# the API deploy from CI. It is manual-only so it never runs (or fails) until you
# add the RAILWAY_TOKEN secret and opt in.
on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Railway service name to deploy'
        required: true
        default: 'api'

jobs:
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        run: railway up --service "${{ github.event.inputs.service }}" --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
